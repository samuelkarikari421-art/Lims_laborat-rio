<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laudos - LIMS Kari Kari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <nav class="sidebar">
        <button id="btnToggle" class="btn-toggle-sidebar"><i class="bi bi-list"></i></button>
        <div class="sidebar-header">
            <img src="assets/img/logo.png" alt="Logo Kari Kari" class="sidebar-logo">
            <div class="brand-subtitle">Lab KariKari LIMS</div>
        </div>
        <div class="sidebar-menu">
            <div class="sidebar-label">Operacional</div>
            <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
            <a href="amostras.html" class="nav-link"><i class="bi bi-box-seam"></i> <span>Amostras</span></a>
            <a href="analises.html" class="nav-link"><i class="bi bi-clipboard-data"></i> <span>Análises</span></a>
            <a href="laudos.html" class="nav-link active"><i class="bi bi-file-earmark-check"></i> <span>Laudos</span></a>
            <a href="reagentes.html" class="nav-link"><i class="bi bi-droplet-half"></i> <span>Reagentes</span></a>
            <a href="solucoes.html" class="nav-link"><i class="bi bi-eyedropper"></i> <span>Soluções</span></a>
            <div class="sidebar-label">Gestão</div>
            <a href="relatorios.html" class="nav-link"><i class="bi bi-graph-up"></i> <span>Relatórios</span></a>
            <a href="produtos.html" class="nav-link"><i class="bi bi-tags"></i> <span>Produtos</span></a>
            <a href="usuarios.html" class="nav-link"><i class="bi bi-people"></i> <span>Usuários</span></a>
        </div>
        <div class="sidebar-footer"><button onclick="window.location.href='login.html'" class="btn-logout"><i class="bi bi-box-arrow-left me-2"></i> <span>Sair</span></button></div>
    </nav>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Gestão de Laudos e Certificados</h2>
            <div>
                <button class="btn btn-dark shadow-sm fw-bold me-2" onclick="imprimirSelecionados()">
                    <i class="bi bi-printer"></i> Imprimir Selecionados
                </button>
            </div>
        </div>

        <div class="row mb-3 bg-white p-3 rounded shadow-sm border-0 mx-0 align-items-end">
            <div class="col-md-6">
                <label class="form-label fw-bold text-muted small mb-1">Buscar Laudo</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscaLaudos" class="form-control border-start-0" placeholder="Nº do Laudo, Produto ou Cód. Amostra..." oninput="filtrarLaudos()">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold text-muted small mb-1">Status</label>
                <select id="filtroStatus" class="form-select" onchange="filtrarLaudos()">
                    <option value="">Todos</option>
                    <option value="AGUARDANDO ASSINATURA">Aguardando Assinatura</option>
                    <option value="CONFORME">Conforme (Aprovado)</option>
                    <option value="NÃO CONFORME">Não Conforme (Reprovado)</option>
                </select>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4" width="5%">
                                <input class="form-check-input border-secondary" type="checkbox" id="checkAll" onchange="toggleSelectAll()">
                            </th>
                            <th>Nº do Laudo</th>
                            <th>Amostra</th>
                            <th>Produto</th>
                            <th>Data</th>
                            <th>Resultado Final</th>
                            <th class="text-end pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaLaudos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="printContainer" style="display: none;"></div>

    <div class="modal fade" id="modalLaudo" tabindex="-1">
        <div class="modal-dialog" style="max-width: 95vw; margin-top: 15px;">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="modal-title fw-bold" id="modalLaudoTitle"><i class="bi bi-file-earmark-text"></i> Detalhes do Laudo</h5>
                    <div>
                        <button id="btnImprimirModal" class="btn btn-info btn-sm fw-bold text-white me-2" style="display: none;" onclick="imprimirLaudoModal()">
                            <i class="bi bi-printer"></i> Imprimir Laudo
                        </button>
                        
                        <button id="btnAssinarModal" class="btn btn-success btn-sm fw-bold me-3" style="display: none;" onclick="assinarLaudo()">
                            <i class="bi bi-pen"></i> Assinar Digitalmente
                        </button>
                        
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                </div>
                <div class="modal-body p-0 bg-light" style="height: 90vh; overflow-y: auto;">
                    <div id="previewLaudoArea" class="d-flex justify-content-center py-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/sidebar.js"></script>
    
    <script>
        const API = window.location.origin + "/api";
        let listaGlobalLaudos = [];
        let laudoAbertoId = null;

        let usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado) { 
            console.warn("⚠️ MODO DESENVOLVIMENTO: Usando usuário de teste.");
            usuarioLogado = { id: 1, nome: "Samuel Kari Kari (Teste)", cargo: "Analista de Qualidade" };
        }

        async function carregarLaudos() {
            try {
                const res = await fetch(`${API}/laudos`);
                listaGlobalLaudos = await res.json();
                filtrarLaudos();
            } catch (e) { console.error(e); }
        }

        function filtrarLaudos() {
            const termo = document.getElementById("buscaLaudos").value.toLowerCase();
            const status = document.getElementById("filtroStatus").value;

            const filtrados = listaGlobalLaudos.filter(l => {
                const matchTexto = l.numero.toLowerCase().includes(termo) || 
                                   l.amostra_cod.toLowerCase().includes(termo) || 
                                   l.produto_nome.toLowerCase().includes(termo);
                
                let matchStatus = true;
                if (status) {
                    if (status === "AGUARDANDO ASSINATURA") matchStatus = l.resultado === "AGUARDANDO ASSINATURA";
                    else if (status === "CONFORME") matchStatus = (l.resultado === "CONFORME" || l.resultado === "APROVADO");
                    else if (status === "NÃO CONFORME") matchStatus = (l.resultado === "NÃO CONFORME" || l.resultado === "REPROVADA" || l.resultado === "REPROVADO");
                }
                return matchTexto && matchStatus;
            });
            renderizarTabela(filtrados);
        }

        function renderizarTabela(lista) {
            const tbody = document.getElementById("tabelaLaudos");
            tbody.innerHTML = "";
            document.getElementById("checkAll").checked = false;

            if (lista.length === 0) {
                tbody.innerHTML = "<tr><td colspan='7' class='text-center py-4 text-muted'>Nenhum laudo encontrado.</td></tr>";
                return;
            }

            lista.forEach(l => {
                let badgeCor = "bg-secondary";
                if (l.resultado === 'CONFORME' || l.resultado === 'APROVADO') badgeCor = "bg-success";
                else if (l.resultado === 'NÃO CONFORME' || l.resultado === 'REPROVADA' || l.resultado === 'REPROVADO') badgeCor = "bg-danger";
                else if (l.resultado === 'AGUARDANDO ASSINATURA') badgeCor = "bg-warning text-dark";

                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4"><input class="form-check-input border-secondary laudo-checkbox" type="checkbox" value="${l.id}"></td>
                        <td class="fw-bold text-primary">${l.numero}</td>
                        <td class="fw-bold">${l.amostra_cod}</td>
                        <td>${l.produto_nome}</td>
                        <td>${l.data_fmt}</td>
                        <td><span class="badge ${badgeCor} shadow-sm">${l.resultado}</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary" onclick="abrirModalLaudo(${l.id})" title="Visualizar / Assinar"><i class="bi bi-eye"></i></button>
                            <button class="btn btn-sm btn-outline-dark ms-1" onclick="excluirLaudo(${l.id}, '${l.resultado}')" title="Excluir / Cancelar"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleSelectAll() {
            const checkAll = document.getElementById("checkAll").checked;
            const checkboxes = document.querySelectorAll('.laudo-checkbox');
            checkboxes.forEach(box => box.checked = checkAll);
        }

        async function imprimirSelecionados() {
            const checkboxes = document.querySelectorAll('.laudo-checkbox:checked');
            if (checkboxes.length === 0) return alert("Por favor, selecione pelo menos um laudo na tabela.");

            const btn = document.querySelector("button[onclick='imprimirSelecionados()']");
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Preparando folhas...`;
            btn.disabled = true;

            const printContainer = document.getElementById("printContainer");
            printContainer.innerHTML = ""; 

            try {
                for (let box of checkboxes) {
                    const id = box.value;
                    const res = await fetch(`${API}/laudos/${id}/detalhes`);
                    const dados = await res.json();

                    if (!dados.cabecalho.emitido_por) {
                        alert(`Atenção: O Laudo ${dados.cabecalho.numero} não pode ser impresso porque ainda não foi assinado.`);
                        continue; 
                    }

                    const htmlFolha = gerarHTMLFolhaA4(dados.cabecalho, dados.resultados);
                    printContainer.innerHTML += htmlFolha;
                }

                if (printContainer.innerHTML.trim() !== "") {
                    window.print();
                }
            } catch (e) {
                console.error(e); alert("Ocorreu um erro ao preparar os laudos para impressão.");
            } finally {
                btn.innerHTML = textoOriginal; btn.disabled = false;
                setTimeout(() => { printContainer.innerHTML = ""; }, 1000); 
            }
        }

        function imprimirLaudoModal() {
            const printContainer = document.getElementById("printContainer");
            printContainer.innerHTML = document.getElementById("previewLaudoArea").innerHTML;
            window.print();
            setTimeout(() => { printContainer.innerHTML = ""; }, 1000);
        }

        // 🔥 MOTOR DE RENDERIZAÇÃO A4 (CORRIGIDO PARA NÃO CORTAR NA DIREITA)
        function gerarHTMLFolhaA4(cab, resultados) {
            let linhasTabela = "";
            resultados.forEach(r => {
                const temMin = r.valor_min !== null && r.valor_min !== undefined;
                const temMax = r.valor_max !== null && r.valor_max !== undefined;
                let spec = "-";
                if(temMin && temMax) spec = `${r.valor_min} a ${r.valor_max}`;
                else if(temMin) spec = `Mín: ${r.valor_min}`;
                else if(temMax) spec = `Máx: ${r.valor_max}`;
                
                const statusFormatado = r.conforme ? 'CONFORME' : 'NÃO CONFORME';

                // Adicionado controle de quebra de texto para evitar que a tabela estique
                linhasTabela += `
                    <tr>
                        <td class="fw-bold" style="word-wrap: break-word; white-space: normal;">${r.parametro || '-'}</td>
                        <td style="word-wrap: break-word; white-space: normal;">${spec}</td>
                        <td class="fw-bold text-center" style="word-wrap: break-word; white-space: normal;">${r.valor_encontrado || '-'}</td>
                        <td class="text-center fw-bold" style="word-wrap: break-word; white-space: normal;">${statusFormatado}</td>
                    </tr>
                `;
            });

            let blocoAssinatura = "";
            if (cab.emitido_por) {
                let imgAssinatura = cab.responsavel_assinatura 
                    ? `<img src="${cab.responsavel_assinatura}" style="height: 60px; object-fit: contain; margin-bottom: 5px;">` 
                    : `<div style="height: 60px;"></div>`;

                blocoAssinatura = `
                    <div class="assinatura-area text-center mt-4">
                        ${imgAssinatura}
                        <div style="border-top: 1px solid #000; width: 350px; margin: 0 auto; padding-top: 8px;">
                            <h6 class="mb-0 fw-bold text-dark">${cab.responsavel_nome}</h6>
                            <small class="text-dark d-block mt-1">${cab.responsavel_cargo}</small>
                            <small class="text-muted d-block mt-2" style="font-size: 0.75rem;">
                                <i class="bi bi-shield-check text-success"></i> Documento emitido e assinado eletronicamente via LIMS em ${cab.data_emissao_fmt}
                            </small>
                        </div>
                    </div>
                `;
            } else {
                blocoAssinatura = `
                    <div class="assinatura-area text-center mt-5">
                        <div class="d-inline-block text-danger fw-bold border border-danger p-3 rounded bg-light" style="width: 350px;">
                            <i class="bi bi-exclamation-triangle-fill"></i> DOCUMENTO NÃO ASSINADO
                        </div>
                    </div>
                `;
            }

            return `
                <div class="folha-a4" style="font-family: Arial, sans-serif; width: 100%; max-width: 100%; box-sizing: border-box; overflow: hidden;">
                    <div class="text-center mb-4">
                        <img src="assets/img/logo.png" alt="Kari Kari Alimentos" style="max-height: 70px; margin-bottom: 10px;">
                        
                        <h4 class="fw-bold mb-0 text-dark">KARI KARI ALIMENTOS</h4>
                        <p class="text-dark small mb-4">Laboratório de Controle de Qualidade</p>
                        
                        <h5 class="fw-bold text-dark text-decoration-underline">CERTIFICADO DE ANÁLISE INTERNA Nº ${cab.numero}</h5>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-4 small text-dark px-1">
                        <div>
                            <p class="mb-1 fw-bold">Produto: <span class="fw-normal">${cab.produto_nome}</span></p>
                            <p class="mb-1 fw-bold">Lote: <span class="fw-normal">${cab.lote || '-'}</span></p>
                        </div>
                        <div class="text-end">
                            <p class="mb-1 fw-bold">Código da Amostra: <span class="fw-normal">${cab.amostra_cod}</span></p>
                            <p class="mb-1 fw-bold">Data de Emissão: <span class="fw-normal">${cab.emitido_por ? cab.data_emissao_fmt : 'Pendente'}</span></p>
                        </div>
                    </div>

                    <h6 class="fw-bold text-dark mb-2 px-1">RESULTADOS ANALÍTICOS</h6>
                    
                    <div class="px-1 w-100" style="box-sizing: border-box;">
                        <table class="table table-bordered border-dark table-sm mb-4 text-dark align-middle w-100" style="table-layout: fixed; word-wrap: break-word;">
                            <thead class="text-center" style="background-color: #f8f9fa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;">
                                <tr>
                                    <th style="width: 40%;">Parâmetro</th>
                                    <th style="width: 25%;">Especificação</th>
                                    <th style="width: 15%;">Resultado</th>
                                    <th style="width: 20%;">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${linhasTabela}
                            </tbody>
                        </table>

                        <div class="parecer-tecnico-box border border-dark fw-bold text-center py-2 mb-4 text-dark w-100" style="font-size: 1.1rem; letter-spacing: 1px; box-sizing: border-box;">
                            PARECER TÉCNICO: ${cab.resultado}
                        </div>
                    </div>

                    ${blocoAssinatura}
                </div>
            `;
        }

        async function abrirModalLaudo(id) {
            laudoAbertoId = id;
            try {
                const res = await fetch(`${API}/laudos/${id}/detalhes`);
                const dados = await res.json();
                
                document.getElementById("modalLaudoTitle").innerHTML = `<i class="bi bi-file-earmark-text"></i> Laudo ${dados.cabecalho.numero}`;
                
                const btnAssinar = document.getElementById("btnAssinarModal");
                const btnImprimir = document.getElementById("btnImprimirModal");

                if (!dados.cabecalho.emitido_por) {
                    btnAssinar.style.display = "inline-block";
                    btnImprimir.style.display = "none";
                } else {
                    btnAssinar.style.display = "none";
                    btnImprimir.style.display = "inline-block";
                }

                document.getElementById("previewLaudoArea").innerHTML = gerarHTMLFolhaA4(dados.cabecalho, dados.resultados);
                new bootstrap.Modal(document.getElementById('modalLaudo')).show();
            } catch(e) { console.error(e); }
        }

        async function assinarLaudo() {
            if(!confirm("Atenção: Ao assinar digitalmente, este laudo será finalizado com o seu nome e não poderá ser alterado. Deseja prosseguir?")) return;
            
            try {
                const res = await fetch(`${API}/laudos/${laudoAbertoId}/assinar`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario_id: usuarioLogado.id })
                });

                if(res.ok) {
                    alert("Laudo assinado com sucesso!");
                    abrirModalLaudo(laudoAbertoId); 
                    carregarLaudos(); 
                } else { alert("Erro ao assinar laudo."); }
            } catch(e) { console.error(e); }
        }

        async function excluirLaudo(id, status) {
            if (status !== 'AGUARDANDO ASSINATURA') {
                if(!confirm("Atenção: Este laudo JÁ ESTÁ ASSINADO. Excluí-lo irá revogar o certificado e a amostra voltará para 'EM ANÁLISE'. Deseja cancelar o laudo?")) return;
            } else {
                if(!confirm("Deseja realmente excluir este laudo pendente?")) return;
            }
            try {
                await fetch(`${API}/laudos/${id}`, { method: 'DELETE' });
                carregarLaudos();
            } catch(e) { console.error(e); }
        }

        carregarLaudos();
    </script>
</body>
</html>
