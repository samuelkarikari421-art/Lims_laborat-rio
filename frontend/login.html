<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - LIMS Kari Kari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            /* Fundo vermelho Kari Kari elegante */
            background: linear-gradient(135deg, #B22222 0%, #5c0000 100%);
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            position: relative; /* Adicionado para ancorar o rodapé */
        }
        .login-card { 
            width: 420px; 
            border: none;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .login-logo {
            max-width: 180px;
            display: block;
            margin: 0 auto 5px auto;
        }
        .login-subtitle {
            color: #b22222;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        /* Estilo do Rodapé */
        .login-footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7); /* Cor branca semitransparente para não chocar com o fundo vermelho */
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .login-footer strong {
            color: rgba(255, 255, 255, 0.95);
        }
        .versao-badge {
            font-size: 0.7rem;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="card-body text-center">
            
            <img src="assets/img/logo.png" alt="Logo Kari Kari" class="login-logo">
            <div class="login-subtitle"> Kari-Kari Alimentos </div>

            <form id="formLogin" class="text-start">
                <div class="mb-3">
                    <label class="fw-bold text-muted small">USUÁRIO</label>
                    <input type="text" id="login" class="form-control bg-light form-control-lg" placeholder="Digite seu login" required>
                </div>
                <div class="mb-4">
                    <label class="fw-bold text-muted small">SENHA</label>
                    <input type="password" id="senha" class="form-control bg-light form-control-lg" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold">ENTRAR</button>
            </form>
            <div id="msg" class="mt-3 text-center text-danger fw-bold small"></div>
        </div>
    </div>

    <footer class="login-footer">
        Todos os direitos reservados &copy; 2026 LIMS Kari Kari <span class="versao-badge">v1.0.0</span><br>   
        Desenvolvido por <strong>Samuel Henrique</strong> <br>
        <span style="font-size: 0.75rem;">(Analista e Desenvolvedor de Sistemas)</span>
    </footer>

<script>
    document.getElementById("formLogin").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.querySelector("button");
        const msg = document.getElementById("msg");
        btn.disabled = true; 
        btn.innerText = "Entrando...";
        
        try {
            const API = window.location.origin + "/api";
            
            const res = await fetch(`${API}/auth/login`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    login: document.getElementById("login").value,
                    senha: document.getElementById("senha").value
                })
            });
            
            const data = await res.json();
            
            if(data.success) {
                // 1. Guarda o objeto completo do usuário (para info geral)
                localStorage.setItem("limsUser", JSON.stringify(data.user));
                
                // 2. Guarda o Token (Crachá de acesso às APIs)
                localStorage.setItem("limsToken", data.token);

                // 🔥 3. DADOS PARA O CONTROLE DE ACESSO (sidebar.js ler)
                const perfil = String(data.user.perfil || "").toUpperCase().trim();
                const p = data.user.permissoes || {};
                
                localStorage.setItem("perfil", perfil);
                localStorage.setItem("permissoes", JSON.stringify(p));

                // =======================================================
                // 🔥 MOTOR DE ROTEAMENTO INTELIGENTE
                // Avalia a permissão de cima para baixo e joga o usuário na 1ª tela útil
                // =======================================================
                let urlDestino = "";

                if (perfil === 'ADMIN' || perfil === 'ADMINISTRADOR' || p.dashboard_view) {
                    urlDestino = "dashboard.html";
                } else if (p.amostras_view) {
                    urlDestino = "amostras.html";
                } else if (p.fifo_view) {
                    urlDestino = "analises.html";
                } else if (p.calc_start) {
                    urlDestino = "calculos.html";
                } else if (p.inv_view) {
                    urlDestino = "investigacao.html";
                } else if (p.laudos_view) {
                    urlDestino = "laudos.html";
                } else if (p.agua_view) {
                    urlDestino = "monitoramento_agua.html";
                } else if (p.reag_reg || p.reag_baixa || p.reag_edit) {
                    urlDestino = "reagentes.html";
                } else if (p.sol_create || p.sol_baixa || p.sol_edit) {
                    urlDestino = "solucoes.html";
                } else if (p.coa_reg || p.coa_down) {
                    urlDestino = "coas.html";
                } else if (p.mat_reg || p.mat_uso || p.mat_edit) {
                    urlDestino = "materiais.html";
                } else if (p.prod_view) {
                    urlDestino = "produtos.html";
                } else if (p.registra_ponto || p.ponto_view) {
                    urlDestino = "ponto.html";
                } else {
                    // Se o usuário não tiver nada liberado, exibe erro e impede o login
                    msg.innerText = "Sua conta não tem nenhuma permissão de tela atribuída. Contate o Administrador.";
                    btn.disabled = false; 
                    btn.innerText = "ENTRAR";
                    localStorage.clear(); // Limpa o token para não deixar lixo
                    return; // Interrompe o processo
                }

                // Redireciona para a URL calculada
                window.location.href = urlDestino;

            } else {
                msg.innerText = data.message;
                btn.disabled = false; 
                btn.innerText = "ENTRAR";
            }
        } catch(err) {
            msg.innerText = "Erro de conexão com o Servidor.";
            btn.disabled = false; 
            btn.innerText = "ENTRAR";
        }
    });
</script>
</body>
</html>
